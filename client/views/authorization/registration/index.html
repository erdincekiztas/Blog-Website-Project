{{ define "index" }}
<!DOCTYPE html>
<html lang="tr">

{{ template "head" }}

<body id="page-top" class="bg-dark">
<div class="container">

    <div class="row justify-content-center">

        <div class="col-xl-10 col-lg-12 col-md-9">

            <div class="col-md-6 offset-3 card o-hidden border-0 shadow-lg my-5">
                <div class="card-body p-0">
                    <div class="row">

                        <div class="col-lg-12">
                            <div class="p-5">
                                <div class="text-center">
                                    <h1 class="h4 text-gray-900 mb-4">Hesap Oluştur</h1>
                                </div>
                                <form class="user" action="/do-register" method="post">
                                    <div class="form-group">
                                        <input type="text" class="form-control form-control-user"
                                               id="inputName"
                                               placeholder="İsim Soyisim:" name="name">
                                    </div>
                                    <div class="form-group">
                                        <input type="email" class="form-control form-control-user"
                                               id="inputEmail"
                                               placeholder="Mail Adresi:" name="mail">
                                    </div>
                                    <div class="form-group">
                                        <input type="password" class="form-control form-control-user"
                                               id="inputPassword"
                                               placeholder="Parola:" name="password">
                                    </div>
                                    <div class="form-group">
                                        <input type="password" class="form-control form-control-user"
                                               id="inputPasswordConfirm"
                                               placeholder="Parola Tekrar:" name="password_confirm">
                                    </div>
                                    <input type="submit" class="btn btn-primary btn-user btn-block" value="Kayıt Ol">
                                </form>
                                <hr>
                                <div>
                                    <a href="/login" class="btn btn-primary btn-user btn-block"
                                       style="border-radius: 10rem; font-size: 0.85rem; padding: 0.75rem 1rem;">
                                        Zaten hesabın var mı? Giriş Yap
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </div>

    </div>

</div>

{{ template "scripts" }}

{{ template "alert" .Alert }}

</body>

</html>
{{ end }}
